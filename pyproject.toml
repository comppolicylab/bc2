[tool.poetry]
name = "bc2"
version = "0.3.2"
description = ""
authors = ["Joe Nudell <jnudell@hks.harvard.edu>"]
license = "MIT"
readme = "README.md"
packages = [
    { include = "blind_charging_core" },
]
exclude = [
    "blind_charging_core/sample_data/*",
    "dev*",
]
include = [
    {path = "blind_charging_data", format = ["sdist", "wheel"] }
]

[tool.poetry.dependencies]
python = "^3.10"
azure-ai-formrecognizer = "3.3.3"
pydantic = "2.9.2"
pydantic-settings = "2.5.2"
click = "^8.1.6"
tqdm = "4.66.5"
pypdf = "5.0.0"
openai = "^1.47.1"
reportlab = "4.2.2"
azure-storage-blob = "12.23.0"
azure-identity = "1.18.0"
typer = "0.12.5"
python-magic = "^0.4.27"
pylibmagic = "^0.5.0"
pymupdf = "^1.24.10"
pytesseract = "0.3.13"
jinja2 = "^3.1.4"

[tool.poetry.group.dev.dependencies]
pre-commit = "3.8.0"
pytest = "8.3.3"
python-jsonschema-objects = "^0.5.5"
jupyter = "^1.1.1"
responses = "^0.25.3"


[tool.poetry.group.server.dependencies]
fastapi = "^0.111.0"
uvicorn = "^0.29.0"
gunicorn = "^22.0.0"

[tool.ruff.lint]
select = ["F", "E", "W", "I001", "C", "W", "B"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
