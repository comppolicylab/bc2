[tool.poetry]
name = "bc2"
version = "0.1.0"
description = ""
authors = ["Joe Nudell <jnudell@hks.harvard.edu>"]
license = ""
readme = "README.md"
packages = [
    { include = "blind_charging_core", from = "lib" }
]

[tool.poetry.dependencies]
python = "^3.10"
azure-ai-formrecognizer = "^3.2.1"
pydantic = "^2.1.0"
pydantic-settings = "^2.0.2"
click = "^8.1.6"
tqdm = "^4.65.0"
pypdf = "^3.14.0"
openai = "^0.27.8"
reportlab = "^4.0.4"
azure-storage-blob = "^12.18.3"
azure-identity = "^1.15.0"
typer = "^0.12.3"

[tool.poetry.group.dev.dependencies]
pre-commit = "^3.4.0"
pytest = "^7.4.2"
python-jsonschema-objects = "^0.5.0"
jupyter = "^1.0.0"
pymupdf = "^1.23.21"

[tool.ruff]
exclude = ["app/server/generated"]

[tool.ruff.lint]
select = ["F", "E", "W", "I001", "C", "W", "B"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
